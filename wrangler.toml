name = "rental-chat-va"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Frontend only for now
pages_build_output_dir = "dist"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "rental-chat-db"
database_id = "92fd2b52-f54d-42a7-95a4-6f24ee79e521"   # ← Keep your exact UUID

# R2 for photos (optional for now)
[[r2_buckets]]
binding = "CHAT_IMAGES"
bucket_name = "rental-chat-images"
